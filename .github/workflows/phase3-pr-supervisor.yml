name: Phase 3 PR Supervisor

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Run ID to execute
        required: true
        type: string
      issue_id:
        description: Issue ID to supervise
        required: true
        type: string
      api_base_url:
        description: Public PASS API base URL
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  pr-supervisor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w @pass/shared

      - name: Run PR supervisor agent
        env:
          PASS_API_BASE_URL: ${{ inputs.api_base_url }}
          PASS_API_TOKEN: ${{ secrets.PASS_API_TOKEN }}
          PASS_GITHUB_WORKFLOW_TOKEN: ${{ secrets.PASS_GITHUB_WORKFLOW_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: npm run -w @pass/agents pr-supervisor -- --run-id=${{ inputs.run_id }} --issue-id=${{ inputs.issue_id }}
